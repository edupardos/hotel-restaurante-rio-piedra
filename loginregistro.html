<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Registro</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/logo.png">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Page login -->
    <div class="page active" id="page-login">
        <section class="py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-12 col-lg-11 col-xl-9">
                        <div class="form-reserva p-0 shadow-sm bg-white overflow-hidden">
                            <div class="row g-0 h-100 align-items-stretch">

                                <!-- Imagen login -->
                                <div class="col-lg-6 d-none d-lg-block">
                                    <div class="login-imagen"></div>
                                </div>

                                <!-- Formulario login -->
                                <div class="col-12 col-lg-6 p-4 p-md-5">
                                    <div class="text-center mb-4">
                                        <a href="index.html">
                                            <img src="img/logo.png" alt="Logo Hotel Río Piedra" class="mb-3" style="height: 70px;">
                                        </a>
                                        <h5>Acceso de usuario</h5>
                                    </div>

                                    <form id="form-login">
                                        <div class="mb-4">
                                            <label for="login-correo" class="form-label text-center w-100">Correo electrónico</label>
                                            <input type="email" class="form-control" id="login-correo" name="correo" required>
                                        </div>

                                        <div class="mb-4">
                                            <label for="login-password" class="form-label text-center w-100">Contraseña</label>
                                            <input type="password" class="form-control" id="login-password" name="password" required>
                                        </div>

                                        <div class="text-center">
                                            <button type="submit" class="btn-reservar px-5 py-3 w-100">
                                                Iniciar sesión
                                            </button>
                                        </div>

                                        <div class="text-center mt-3">
                                            <p id="mensaje-login" class="mb-0"></p>
                                        </div>

                                        <div class="text-center mt-4">
                                            <div id="bloque-registro">
                                                <p class="mb-0">¿No tienes cuenta?</p>
                                                <a href="#" id="btn-ir-registro" class="text-decoration-none">
                                                    Registrarse
                                                </a>
                                            </div>
                                        </div>
                                    </form>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Page registro -->
    <div class="page" id="page-registro">
        <div class="py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-12 col-lg-10 col-xl-8">
                        <div class="form-reserva p-0 shadow-sm bg-white overflow-hidden">
                            <div class="row g-0 h-100 align-items-stretch">

                                <!-- Imagen registro -->
                                <div class="col-lg-6 d-none d-lg-block">
                                    <div class="login-imagen"></div>
                                </div>

                                <!-- Formulario registro -->
                                <div class="col-12 col-lg-6 p-4 p-md-5">
                                    <div class="text-center mb-4">
                                        <a href="index.html">
                                            <img src="img/logo.png" alt="Logo Hotel Río Piedra" class="mb-3" style="height:70px;">
                                        </a>
                                        <h5>Registrar usuario</h5>
                                    </div>

                                    <form id="form-registro">
                                        <div class="row g-4">
                                            <div class="col-12 col-lg-6">
                                                <label for="registro-nombre" class="form-label text-center w-100">Nombre</label>
                                                <input type="text" class="form-control" id="registro-nombre" name="nombre" required>
                                            </div>

                                            <div class="col-12 col-lg-6">
                                                <label for="registro-apellidos" class="form-label text-center w-100">Apellidos</label>
                                                <input type="text" class="form-control" id="registro-apellidos" name="apellidos" required>
                                            </div>

                                            <div class="col-12">
                                                <label for="registro-correo" class="form-label text-center w-100">Correo electrónico</label>
                                                <input type="email" class="form-control" id="registro-correo" name="correo" required>
                                            </div>

                                            <div class="col-12">
                                                <label for="registro-password" class="form-label text-center w-100">Contraseña</label>
                                                <input type="password" class="form-control" id="registro-password" name="password" required>
                                            </div>

                                            <div class="col-12 text-center pt-3">
                                                <button type="submit" class="btn-reservar px-5 py-3 w-100">
                                                    Registrar
                                                </button>
                                            </div>

                                            <div class="col-12 text-center">
                                                <p id="mensaje-registro" class="mb-0"></p>
                                            </div>
                                        </div>
                                    </form>

                                    <div class="text-center mt-4">
                                        <p class="mb-0">¿Ya tienes cuenta?</p>
                                        <a href="#" id="btn-ir-login" class="text-decoration-none">
                                            Iniciar sesión
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/app.js"></script>
    <script src="js/loginregistro.js"></script>
</body>
</html>
