<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/logo.png">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="py-3">
        <div class="container d-flex align-items-center justify-content-between">

            <!-- Botón atrás -->
            <a href="index.html" class="btn-reservar">
                Atrás
            </a>

            <!-- Logo centrado -->
            <div class="mx-auto">
                <img src="img/logo.png" alt="Logo Hotel Río Piedra" class="logo-navbar">
            </div>

            <!-- Espacio vacío para equilibrar -->
            <div style="width:80px;"></div>

        </div>
    </div>

    <div class="separador-linea">
        <div class="container">
            <div class="linea-marron"></div>
        </div>
    </div>

    <section class="py-2">
        <div class="container">

            <!-- Título -->
            <h4 class="text-center mb-4">Datos personales</h4>

            <!-- Contenedor con borde -->
            <div class="form-reserva p-4 p-md-5 shadow-sm bg-white">

                <form>
                    <div class="row g-4">

                        <!-- Nombre -->
                        <div class="col-12 col-lg-6">
                            <label class="form-label text-center w-100">Nombre</label>
                            <input type="text" class="form-control">
                        </div>

                        <!-- Apellidos -->
                        <div class="col-12 col-lg-6">
                            <label class="form-label text-center w-100">Apellidos</label>
                            <input type="text" class="form-control">
                        </div>

                        <!-- Teléfono -->
                        <div class="col-12 col-lg-6">
                            <label class="form-label text-center w-100">Teléfono</label>
                            <input type="tel" class="form-control">
                        </div>

                        <!-- Foto perfil -->
                        <div class="col-12 col-lg-6">
                            <label class="form-label text-center w-100">Foto de perfil</label>
                            <input type="file" class="form-control">
                        </div>

                        <!-- Correo -->
                        <div class="col-12">
                            <label class="form-label text-center w-100">Correo electrónico</label>
                            <input type="email" class="form-control">
                        </div>

                        <!-- Dirección -->
                        <div class="col-12">
                            <label class="form-label text-center w-100">Dirección</label>
                            <input type="text" class="form-control">
                        </div>

                        <!-- Botones reservas -->
                        <div class="col-12 pt-3">
                            <div class="d-flex flex-column flex-md-row justify-content-center gap-3">

                                <button type="button" class="btn-reservar px-4 py-3">
                                    Reservas Hotel
                                </button>

                                <button type="button" class="btn-reservar px-4 py-3">
                                    Reservas Restaurante
                                </button>

                            </div>
                        </div>

                    </div>
                </form>

            </div>

        </div>
    </section>
</body>

</html>
